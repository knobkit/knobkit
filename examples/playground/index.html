<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>knobkit — playground</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #root {
        height: 100%;
      }
      .pu-page {
        max-width: none;
        height: 100vh;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }
      .pu-page > .pu-field {
        flex: 1 1 auto;
        min-height: 0;
      }
      .pu-layout-row,
      .pu-layout-col {
        min-height: 0;
        height: 100%;
      }
      .pu-frame {
        height: 100%;
        min-height: 0;
      }
      .pu-code {
        min-height: 58vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./demo.tsx"></script>
  </body>
</html>
